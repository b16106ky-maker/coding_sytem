<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Flow Todo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/todo-list.png">
</head>
<body>
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="container">
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon">✨</span>
                <h1>TaskFlow</h1>
            </div>
            <p class="subtitle">洗練されたタスク管理スペース</p>
        </header>

        <main class="todo-card">
            <!-- Add Todo Input Container -->
            <form id="todo-form" class="todo-input-container" onsubmit="event.preventDefault();">
                <input 
                    type="text" 
                    id="todo-input" 
                    placeholder="新しいタスクを入力してください..." 
                    autocomplete="off"
                    required
                >
                <input 
                    type="datetime-local" 
                    id="todo-due"
                    class="todo-due-input"
                    title="期限日時を設定（任意）"
                >
                <button type="submit" id="add-btn" aria-label="タスクを追加">
                    <span class="btn-text">追加</span>
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Todo Status Info -->
            <div class="todo-status">
                <div class="status-counters">
                    <span id="task-counter">タスク: 0 件</span>
                    <span id="completed-counter">完了: 0 件</span>
                </div>
                <div class="todo-sort-container">
                    <label for="todo-sort" class="sort-label">並び替え:</label>
                    <select id="todo-sort" class="sort-select">
                        <option value="newest">新しい順</option>
                        <option value="oldest">入力した順</option>
                    </select>
                </div>
            </div>

            <!-- Todo List -->
            <ul id="todo-list" class="todo-list">
                <!-- Dynamic Content Will Be Injected Here -->
            </ul>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
